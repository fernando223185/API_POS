name: Deploy API to Server

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch: # Permite ejecutar manualmente desde GitHub

env:
  DOTNET_VERSION: '8.0.x'
  PROJECT_PATH: 'Web.Api/Web.Api.csproj'
  PUBLISH_PATH: './publish'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4
      
    - name: 🔧 Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}
        
    - name: 📦 Restore dependencies
      run: dotnet restore
      
    - name: ⚙️ Create appsettings.json for Production
      run: |
        cat > Web.Api/appsettings.json << 'EOF'
        {
          "ConnectionStrings": {
            "DefaultConnection": "${{ secrets.DB_CONNECTION_STRING }}"
          },
          "Jwt": {
            "Key": "${{ secrets.JWT_SECRET_KEY }}",
            "Issuer": "${{ secrets.JWT_ISSUER }}",
            "Audience": "${{ secrets.JWT_AUDIENCE }}"
          },
          "AWS": {
            "AccessKey": "${{ secrets.AWS_ACCESS_KEY }}",
            "SecretKey": "${{ secrets.AWS_SECRET_KEY }}",
            "Region": "${{ secrets.AWS_REGION }}",
            "S3": {
              "BucketName": "${{ secrets.AWS_S3_BUCKET }}",
              "CertificatesBucketName": "${{ secrets.AWS_S3_CERTIFICATES_BUCKET }}"
            }
          },
          "Sapiens": {
            "User": "${{ secrets.SAPIENS_USER }}",
            "Password": "${{ secrets.SAPIENS_PASSWORD }}",
            "BaseUrl": "${{ secrets.SAPIENS_BASE_URL }}",
            "UseProdEnvironment": true
          },
          "Certificate": {
            "EncryptionKey": "${{ secrets.CERTIFICATE_ENCRYPTION_KEY }}"
          },
          "Logging": {
            "LogLevel": {
              "Default": "Information",
              "Microsoft.AspNetCore": "Warning"
            }
          },
          "AllowedHosts": "*",
          "Tools": {
            "DotNetEf": {
              "GlobalInstallation": true
            }
          }
        }
        EOF
        echo "✅ appsettings.json created for production deployment"
        
    - name: 🏗️ Build project
      run: dotnet build --configuration Release --no-restore
      
    - name: 🧪 Run tests (opcional - descomenta si tienes tests)
      # run: dotnet test --no-build --verbosity normal
      run: echo "No tests configured yet"
      
    - name: 📤 Publish application
      run: |
        dotnet publish ${{ env.PROJECT_PATH }} \
          --configuration Release \
          --output ${{ env.PUBLISH_PATH }} \
          --no-build \
          --self-contained false
          
    - name: 📋 List published files
      run: ls -la ${{ env.PUBLISH_PATH }}
      
    # ============================================
    # OPCIÓN 1: Deploy a EC2 con SSH
    # ============================================
    - name: 🚀 Deploy to EC2 via SSH
      uses: appleboy/scp-action@v0.1.7
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USER }}
        key: ${{ secrets.EC2_SSH_KEY }}
        source: "${{ env.PUBLISH_PATH }}/*"
        target: "/home/ubuntu/api/publish"
        strip_components: 1
        rm: true
        
    - name: ⚙️ Configure and verify appsettings on server
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USER }}
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          cd /home/ubuntu/api/publish
          
          # Verificar que appsettings.json existe (debería estar desde el SCP)
          if [ -f "appsettings.json" ]; then
            echo "✅ appsettings.json found"
          else
            echo "❌ ERROR: appsettings.json not found!"
            exit 1
          fi
          
          # Verificar permisos
          sudo chown -R ubuntu:ubuntu /home/ubuntu/api/publish
          sudo chmod 644 appsettings.json
          
          echo "📋 Configuration files:"
          ls -la appsettings*.json
          
    - name: 🔄 Restart API service on EC2
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USER }}
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          sudo systemctl restart api-pos
          sleep 3
          sudo systemctl status api-pos --no-pager
          
          # Verificar que la API responde
          echo "🔍 Checking API health..."
          curl -s http://localhost:7254/swagger/index.html > /dev/null && echo "✅ API is responding" || echo "⚠️ API might not be responding yet"
          
    # ============================================
